name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v0.2.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build Release Artifacts
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Validate version
        run: |
          case "${RELEASE_VERSION}" in
            v*)
              ;;
            *)
              echo "release version must start with v"
              exit 1
              ;;
          esac

      - name: Run tests
        run: go test ./...

      - name: Run release build script
        run: ./scripts/build-release-artifacts.sh "${RELEASE_VERSION}"

      - name: Create checksums
        working-directory: dist/release
        run: sha256sum *.tar.gz > SHA256SUMS

      - name: Update rolling latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f latest "${GITHUB_SHA}"
          git push origin refs/tags/latest --force

      - name: Prepare rolling latest assets
        run: |
          mkdir -p dist/latest
          cp "dist/release/ecoflow-ble-nutd-${RELEASE_VERSION}-linux-amd64.tar.gz" "dist/latest/ecoflow-ble-nutd-linux-amd64.tar.gz"
          cp "dist/release/ecoflow-ble-nutd-${RELEASE_VERSION}-linux-arm64.tar.gz" "dist/latest/ecoflow-ble-nutd-linux-arm64.tar.gz"
          cp "dist/release/ecoflow-ble-nutd-${RELEASE_VERSION}-linux-armv7.tar.gz" "dist/latest/ecoflow-ble-nutd-linux-armv7.tar.gz"
          cd dist/latest
          sha256sum *.tar.gz > SHA256SUMS

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          generate_release_notes: true
          files: |
            dist/release/*.tar.gz
            dist/release/SHA256SUMS

      - name: Publish rolling latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          overwrite_files: true
          body: |
            Rolling latest release for `${{ env.RELEASE_VERSION }}`.

            Use this release only when you want a moving target for install or update scripts.
            Use the versioned `v*` releases when you need a pinned, reproducible artifact.
          files: |
            dist/latest/*.tar.gz
            dist/latest/SHA256SUMS
