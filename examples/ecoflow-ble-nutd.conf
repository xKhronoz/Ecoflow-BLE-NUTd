listen: 0.0.0.0:3493
auth:
  username: monuser
  password: secret
web:
  enable: true
  listen: 127.0.0.1:8080
provider:
  type: eco-ble
  adapter: hci0
  scan_timeout_seconds: 8
  connect_timeout_seconds: 20
  reconnect_delay_seconds: 10
  poll_seconds: 15
  auth:
    user_id: ""
    email: user@example.com
    password: change-me
    region: auto
devices:
  - name: delta2
    description: EcoFlow Delta 2 BLE
    model: DELTA 2
    mac: AA:BB:CC:DD:EE:01
    low_battery_percent: 20
    low_runtime_seconds: 300
    stale_timeout_seconds: 60
  - name: river3
    description: EcoFlow River 3 BLE
    model: RIVER 3
    mac: AA:BB:CC:DD:EE:02
    low_battery_percent: 25
    low_runtime_seconds: 600
    stale_timeout_seconds: 60
